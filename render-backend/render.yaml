services:
  - type: web
    name: ncec-ocr-backend
    runtime: docker
    rootDir: render-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8100
      - key: CHAT_MODEL
        value: vicuna-68m
      - key: MODEL_DIR
        value: /app/models
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
