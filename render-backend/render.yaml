services:
  - type: web
    name: ncec-ocr-backend
    runtime: docker
    rootDir: render-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8100
      - key: CHAT_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
