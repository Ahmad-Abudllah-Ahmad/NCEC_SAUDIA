services:
  - type: web
    name: ncec-ocr-backend
    runtime: docker
    rootDir: render-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8100
      - key: CHAT_MODEL
        value: gemini-2.0-flash-lite
      - key: EMBED_MODEL
        value: text-embedding-004
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
